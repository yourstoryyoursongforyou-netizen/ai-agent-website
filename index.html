<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Agent Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #1e293b, #020617 70%);
  color: white;
  text-align: center;
}

/* HERO */
.hero {
  padding: 80px 20px 40px;
}

.hero h1 {
  font-size: 3rem;
  font-weight: 700;
  background: linear-gradient(90deg,#3b82f6,#8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero p {
  margin-top: 15px;
  color: #94a3b8;
  font-size: 1.2rem;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 30px;
  padding: 14px 28px;
  border-radius: 12px;
  background: linear-gradient(90deg,#3b82f6,#8b5cf6);
  color: white;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* CHATBOX */
.chat-container {
  max-width: 650px;
  margin: 40px auto;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 16px;
}

#messages {
  height: 300px;
  overflow-y: auto;
  text-align: left;
  margin-bottom: 10px;
}

.message {
  margin: 10px 0;
}

.user { color: #3b82f6; }
.ai { color: #8b5cf6; }

/* INPUT */
.input-area {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 12px 18px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg,#3b82f6,#8b5cf6);
  color: white;
  cursor: pointer;
}

/* FOOTER */
.footer {
  margin-top: 40px;
  color: #64748b;
  font-size: 0.9rem;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>AI Agents That Grow Your Business</h1>
  <p>We build custom AI systems that automate sales, support, and operations.</p>

  <a href="https://calendly.com/YOUR-LINK" class="btn">
    Book a Free Strategy Call
  </a>
</div>

<!-- CHAT -->
<div class="chat-container">
  <div id="messages"></div>

  <div class="input-area">
    <input id="input" placeholder="Ask how AI can grow your business..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<div class="footer">
  © 2026 AI Agent Studio
</div>

<script>
async function sendMessage() {
  const input = document.getElementById("input");
  const messages = document.getElementById("messages");
  const text = input.value.trim();

  if (!text) return;

  messages.innerHTML += `<div class="message user"><b>You:</b> ${text}</div>`;

  try {
    const res = await fetch("https://ai-agent-website-1.onrender.com/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    messages.innerHTML += `<div class="message ai"><b>AI:</b> ${data.reply}</div>`;
  } catch (err) {
    messages.innerHTML += `<div class="message ai">Error connecting to AI</div>`;
  }

  input.value = "";
  messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
