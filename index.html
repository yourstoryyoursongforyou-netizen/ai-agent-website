<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #111827, #020617);
      color: white;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 80px 20px;
      text-align: center;
    }

    h1 {
      font-size: 56px;
      font-weight: 600;
    }

    p {
      color: #9CA3AF;
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn {
      background: linear-gradient(90deg, #3B82F6, #8B5CF6);
      padding: 14px 24px;
      border-radius: 10px;
      color: white;
      text-decoration: none;
      margin: 10px;
      display: inline-block;
      transition: 0.3s;
    }

    .btn:hover {
      opacity: 0.8;
    }

    .section {
      margin-top: 100px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

  </style>
</head>

<body>

<div class="container">
  <h1>Build AI Agents That Work 24/7</h1>
  <p>We design and deploy AI agents that automate your business.</p>
  
  <a href="#" class="btn">Book a Call</a>
  <a href="#" class="btn">See Demo</a>

  <div class="section">
    <h2>Our Services</h2>
    <div class="grid">
      <div class="card">🤖 AI Chatbots</div>
      <div class="card">📈 Sales Automation</div>
      <div class="card">🧠 Internal Assistants</div>
      <div class="card">🔗 Workflow Automation</div>
    </div>
  </div>

  <div class="section">
    <h2>How It Works</h2>
    <p>Discover → Build → Deploy → Optimize</p>
  </div>

</div>

</body>
</html>
